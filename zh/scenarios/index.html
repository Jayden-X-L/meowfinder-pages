    <main class="mx-auto max-w-4xl px-4 py-10 text-gray-800"><h1 class="mb-4 text-4xl font-bold">找猫示例场景</h1><p class="mb-6 text-lg text-gray-600">这些是基于常见猫咪躲藏行为整理的示例场景，不是已验证的用户真实反馈。</p><section class="mb-6"><h2 class="mb-2 text-2xl font-bold">洗衣机后面</h2><p>短暂播放罐头盖拨动声后停止并倾听。移动电器前，先用手电筒寻找眼睛反光。</p></section><section class="mb-6"><h2 class="mb-2 text-2xl font-bold">衣柜里的箱子</h2><p>胆小的小猫可能不会回应人的呼唤。播放一次轻柔小猫叫，再静听箱子或衣物里的移动声。</p></section><section class="mb-6"><h2 class="mb-2 text-2xl font-bold">最近打开过的门附近</h2><p>从门口开始，沿墙边、灌木、楼梯和停放车辆安静搜索，不要追赶。</p></section><section class="mb-6"><h2 class="mb-2 text-2xl font-bold">方法与参考来源</h2><ul><li><a href="https://www.cats.org.uk/help-and-advice/lost-found-and-feral-cats/lost-a-cat">Cats Protection 猫咪走失指南</a></li><li><a href="https://www.aspca.org/pet-care/general-pet-care/finding-lost-pet">ASPCA 寻找走失宠物指南</a></li><li><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC5789300/">走失猫搜索方法的同行评议研究</a></li></ul></section><nav aria-label="More MeowFinder guides" class="flex flex-wrap gap-4"><a href="/zh/tutorial/">30 分钟搜索指南</a><a href="/zh/scenarios/">示例场景</a><a href="/zh/outdoor-guide/">室外丢猫指南</a></nav></main>
