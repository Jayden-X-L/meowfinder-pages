    <main class="mx-auto max-w-4xl px-4 py-10 text-gray-800"><h1 class="mb-4 text-4xl font-bold">找不到猫？先判断情况，再播放声音</h1><p class="mb-6 text-lg text-gray-600">选择最接近的情况，播放一个熟悉声音 10 秒，停止并静听 30 秒，然后逐个房间检查高概率藏身点。</p><section class="mb-6"><h2 class="mb-2 text-2xl font-bold">从一个熟悉声音开始</h2><p>低音量尝试开罐头、拨动罐盖、零食袋、喂食器颗粒声、玩具铃铛或短暂小猫叫声，避免连续循环。</p></section><section class="mb-6"><h2 class="mb-2 text-2xl font-bold">按 30 分钟流程平静搜索</h2><p>先让家里安静下来，在每次短暂播放后倾听，完整检查一个房间，再根据门窗情况决定是否扩大到室外。</p></section><section class="mb-6"><h2 class="mb-2 text-2xl font-bold">方法与参考来源</h2><ul><li><a href="https://www.cats.org.uk/help-and-advice/lost-found-and-feral-cats/lost-a-cat">Cats Protection 猫咪走失指南</a></li><li><a href="https://www.aspca.org/pet-care/general-pet-care/finding-lost-pet">ASPCA 寻找走失宠物指南</a></li><li><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC5789300/">走失猫搜索方法的同行评议研究</a></li></ul></section><nav aria-label="More MeowFinder guides" class="flex flex-wrap gap-4"><a href="/zh/tutorial/">30 分钟搜索指南</a><a href="/zh/scenarios/">示例场景</a><a href="/zh/outdoor-guide/">室外丢猫指南</a></nav></main>
